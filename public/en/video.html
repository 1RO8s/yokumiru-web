<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>YouTube Player</title>
    <style>
      html,
      body,
      #player {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');
      let player = null;
      let hasReportedPlaying = false;

      function postToApp(payload) {
        const message = JSON.stringify(payload);
        if (window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === 'function') {
          window.ReactNativeWebView.postMessage(message);
        }
        window.parent?.postMessage(message, '*');
      }

      if (/^[a-zA-Z0-9_-]{6,}$/.test(videoId || '')) {
        const embedParams = new URLSearchParams({
          playsinline: '1',
          rel: '0',
          modestbranding: '1',
          controls: '1',
          disablekb: '1',
          fs: '0',
          iv_load_policy: '3',
          enablejsapi: '1',
          origin: window.location.origin,
        });
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${embedParams.toString()}`;
        iframe.allow = 'encrypted-media';
        iframe.allowFullscreen = false;
        iframe.referrerPolicy = 'origin-when-cross-origin';
        iframe.sandbox = 'allow-scripts allow-same-origin allow-presentation';
        iframe.id = 'youtube-player';
        document.getElementById('player').appendChild(iframe);
      }

      window.onYouTubeIframeAPIReady = function () {
        if (!document.getElementById('youtube-player')) {
          return;
        }

        player = new YT.Player('youtube-player', {
          events: {
            onStateChange(event) {
              if (event.data === YT.PlayerState.PLAYING && !hasReportedPlaying) {
                hasReportedPlaying = true;
                postToApp({
                  type: 'youtube_playback',
                  event: 'playing',
                  videoId,
                  currentTime: typeof player?.getCurrentTime === 'function' ? player.getCurrentTime() : 0,
                  occurredAt: new Date().toISOString(),
                });
              }
            },
          },
        });
      };
    </script>
  </body>
</html>
